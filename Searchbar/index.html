<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ninjago Index</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="background" ></div>
      <div class="search-wrapper">
        <label for="search">Search Ninjago Index:</label>
        <input type="search" id="search" placeholder="Search..." data-search />
      </div>
      <div class="hero-cards" data-hero-cards-container></div>
      <template data-hero-template>
        <div class="card">
          <div class="card-image">
            <img data-img />
          </div>
          <div class="card-content">
            <div class="header" data-header></div>
            <div class="body" data-body></div>
          </div>
        </div>
      </template>

  </body>
</html>
