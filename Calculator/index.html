<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="calc-grid">
      <div class="output">
        <div class="prev-operand" data-prev-operand></div>
        <div class="current-operand" data-current-operand></div>
      </div>
      <button class="operation" data-operation>%</button>
      <button class="operation"data-clear-current>CE</button>
      <button class="operation"data-all-clear>C</button>
      <button class="operation"data-delete>⌫</button>
      <button class="operation" data-reciprocal>1/x</button>
      <button class="operation" data-squared>x²</button>
      <button class="operation" data-sqrt>√x</button>
      <button class="operation" data-operation>÷</button>
      <button data-number>1</button>
      <button data-number>2</button>
      <button data-number>3</button>
      <button class="operation" data-operation>×</button>
      <button data-number>4</button>
      <button data-number>5</button>
      <button data-number>6</button>
      <button class="operation" data-operation>-</button>
      <button data-number>7</button>
      <button data-number>8</button>
      <button data-number>9</button>
      <button class="operation" data-operation>+</button>
      <button class="operation" data-negate>+/-</button>
      <button data-number>0</button>
      <button data-number>.</button>
      <button class="equals" data-equals>=</button>
    </div>
  </body>
</html>
